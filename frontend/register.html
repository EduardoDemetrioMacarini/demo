<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - ControlPro</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/png" href="assets/logo.png">
</head>
<body>
    <div class="auth-container">
        <div style="text-align: center; margin-bottom: 25px;">
            <img src="assets/logo.png" width="65" height="65" style="vertical-align: middle; border-radius: 8px;">
            <div style="font-weight: 600; font-size: 1.8rem; color: white; margin-top: 10px;">Control<span style="font-weight: 300;">Pro</span></div>
        </div>
        <p class="subtitle">Cadastre-se para acessar o sistema.</p>
        
        <div id="alertBox" class="alert"></div>

        <form onsubmit="handleRegister(event)">
            <div class="form-group">
                <input type="text" id="username" placeholder="Nome de Usuário" required autocomplete="username">
            </div>
            <div class="form-group">
                <input type="email" id="email" placeholder="Seu E-mail" required autocomplete="email">
            </div>
            <div class="form-group">
                <input type="password" id="password" placeholder="Crie uma Senha Forte" required autocomplete="new-password">
            </div>
            
            <button type="submit" class="btn-primary">Criar Conta</button>
            
            <div class="links">
                <a href="index.html" style="margin: 0 auto;">Já tenho uma conta. Fazer login</a>
            </div>
        </form>
    </div>

    <script src="app.js"></script>
</body>
</html>
