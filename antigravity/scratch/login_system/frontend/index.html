<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ControlPro</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="auth-container">
        <div style="text-align: center; margin-bottom: 25px;">
            <svg viewBox="0 0 100 100" width="65" height="65" style="vertical-align: middle;">
               <path d="M 50 15 Q 90 15 90 45 Q 90 60 50 60 Q 15 60 15 75 Q 15 95 50 95 Q 90 95 90 75" fill="none" stroke="#3b82f6" stroke-width="12" stroke-linecap="round"/>
            </svg>
            <div style="font-weight: 600; font-size: 1.8rem; color: white; margin-top: 10px;">Control<span style="font-weight: 300;">Pro</span></div>
        </div>
        <p class="subtitle">Bem-vindo de volta, insira seus dados para continuar.</p>
        
        <div id="alertBox" class="alert"></div>

        <form onsubmit="handleLogin(event)">
            <div class="form-group">
                <input type="text" id="username" placeholder="Nome de Usuário ou E-mail" required autocomplete="username">
            </div>
            <div class="form-group">
                <input type="password" id="password" placeholder="Sua Senha" required autocomplete="current-password">
            </div>
            
            <button type="submit" class="btn-primary">Entrar</button>
            
            <div class="links">
                <a href="register.html">Criar uma conta</a>
                <a href="reset.html">Esqueci a senha</a>
            </div>
        </form>
    </div>

    <script src="app.js"></script>
</body>
</html>
